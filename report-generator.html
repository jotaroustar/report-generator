<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周报/日报生成器 | jotarou.com</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --bg2: #ede7da;
    --brown: #2c1f0e;
    --brown2: #6b5740;
    --brown3: #a0896e;
    --orange: #d4622a;
    --orange2: #b84e1e;
    --orange-light: rgba(212,98,42,0.10);
    --orange-border: rgba(212,98,42,0.22);
    --white: #fff;
    --card: rgba(255,255,255,0.60);
    --radius: 14px;
    --shadow: 0 2px 12px rgba(44,31,14,0.08);
  }

  body {
    background: var(--bg);
    color: var(--brown);
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  .header {
    background: var(--brown);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    background: var(--orange);
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    padding: 5px 9px;
    border-radius: 8px;
    letter-spacing: -0.5px;
  }
  .header-title { color: #fff; font-size: 17px; font-weight: 600; }
  .header-sub { color: var(--brown3); font-size: 13px; margin-top: 1px; }

  /* ── Main layout ── */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 16px 0;
  }

  /* ── Section card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--orange-border);
    border-radius: var(--radius);
    padding: 22px 22px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--orange2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title-left::before {
    content: '';
    display: inline-block;
    width: 4px; height: 14px;
    background: var(--orange);
    border-radius: 2px;
  }

  /* ── Toggle row ── */
  .toggle-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .toggle-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 0;
    border-radius: 10px;
    border: 1.5px solid var(--orange-border);
    background: transparent;
    color: var(--brown2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }
  .toggle-btn:hover:not(.active) {
    border-color: var(--orange);
    color: var(--orange);
  }

  /* ── Input mode tabs ── */
  .mode-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 18px;
    border: 1.5px solid var(--orange-border);
    border-radius: 10px;
    overflow: hidden;
  }
  .mode-tab {
    flex: 1;
    padding: 9px 0;
    background: transparent;
    border: none;
    color: var(--brown2);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-tab.active {
    background: var(--orange-light);
    color: var(--orange);
  }
  .mode-tab + .mode-tab {
    border-left: 1.5px solid var(--orange-border);
  }

  /* ── Inputs ── */
  textarea, input[type="text"], input[type="password"], select {
    width: 100%;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid var(--orange-border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--brown);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea { resize: vertical; min-height: 120px; }
  textarea:focus, input:focus, select:focus { border-color: var(--orange); }
  textarea::placeholder, input::placeholder { color: var(--brown3); }

  /* ── Structured form ── */
  .struct-form { display: flex; flex-direction: column; gap: 12px; }
  .form-item label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--brown2);
    margin-bottom: 6px;
  }
  .form-item label .badge {
    display: inline-block;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 6px;
    margin-left: 6px;
    font-weight: 500;
  }
  .badge-req { background: rgba(212,98,42,0.12); color: var(--orange2); }
  .badge-opt { background: rgba(107,87,64,0.10); color: var(--brown3); }

  /* ── Options row ── */
  .options-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .opt-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
  .opt-label { font-size: 12px; color: var(--brown3); font-weight: 600; letter-spacing: 0.04em; }
  .opt-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .opt-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--orange-border);
    background: transparent;
    color: var(--brown2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .opt-btn.active {
    background: var(--orange-light);
    border-color: var(--orange);
    color: var(--orange);
    font-weight: 700;
  }
  .opt-btn:hover:not(.active) { border-color: var(--orange); color: var(--orange); }

  /* ── API Key & Adv Settings ── */
  .key-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
  }
  .key-row input { flex: 2; padding: 10px 14px; }
  .key-row select { flex: 1; padding: 10px 14px; cursor: pointer; }
  
  .adv-toggle {
    font-size: 12px;
    color: var(--orange2);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: var(--orange-border);
    text-underline-offset: 4px;
  }
  .adv-panel {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--orange-border);
  }
  .adv-panel.visible { display: block; }

  /* ── Generate button ── */
  .gen-btn {
    width: 100%;
    padding: 14px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, opacity 0.15s;
    margin-bottom: 16px;
  }
  .gen-btn:hover { background: var(--orange2); }
  .gen-btn.loading-state {
    background: #d93838; /* Red for stop */
  }
  .gen-btn.loading-state:hover { background: #b82c2c; }

  /* ── Result ── */
  .result-card {
    display: none;
    background: var(--card);
    border: 1.5px solid var(--orange-border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .result-card.visible { display: block; }
  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .action-btns {
    display: flex;
    gap: 8px;
  }
  .action-btn {
    padding: 7px 18px;
    background: var(--orange-light);
    border: 1.5px solid var(--orange-border);
    border-radius: 8px;
    color: var(--orange);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover { background: var(--orange); color: #fff; border-color: var(--orange); }
  
  /* Markdown Styles inside result */
  .result-text {
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--orange-border);
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--brown);
    min-height: 80px;
    overflow-x: auto;
  }
  .result-text h1, .result-text h2, .result-text h3 {
    color: var(--orange2);
    margin-top: 12px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .result-text h1 { font-size: 18px; }
  .result-text h2 { font-size: 16px; }
  .result-text h3 { font-size: 15px; }
  .result-text ul, .result-text ol { margin-left: 20px; margin-bottom: 10px; }
  .result-text p { margin-bottom: 10px; }
  .result-text strong { color: var(--brown); font-weight: 700; }
  .result-text code { 
    background: var(--bg2); 
    padding: 2px 4px; 
    border-radius: 4px; 
    font-family: monospace;
    font-size: 13px;
  }

  .word-count {
    font-size: 12px;
    color: var(--brown3);
    margin-top: 8px;
    text-align: right;
  }

  /* ── Loading ── */
  .loading {
    display: none;
    align-items: center;
    gap: 10px;
    color: var(--brown2);
    font-size: 14px;
    padding: 14px 0;
  }
  .loading.visible { display: flex; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--orange-border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── History ── */
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item {
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--orange-border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--orange); }
  .history-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .history-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--orange-light);
    color: var(--orange2);
  }
  .history-date { font-size: 11px; color: var(--brown3); }
  .history-preview {
    font-size: 13px;
    color: var(--brown2);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .history-del {
    background: none;
    border: none;
    color: var(--brown3);
    font-size: 13px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.15s;
  }
  .history-del:hover { color: var(--orange); }
  .empty-history {
    text-align: center;
    color: var(--brown3);
    font-size: 13px;
    padding: 20px 0;
  }

  /* ── Tip ── */
  .tip {
    background: var(--orange-light);
    border: 1px solid var(--orange-border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--brown2);
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .tip strong { color: var(--orange2); }

  /* ── Missing data warn ── */
  .warn-list {
    display: none;
    margin-top: 10px;
  }
  .warn-list.visible { display: block; }
  .warn-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--brown2);
    padding: 6px 0;
    border-bottom: 1px solid var(--orange-border);
  }
  .warn-item:last-child { border-bottom: none; }
  .warn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    margin-top: 5px;
    flex-shrink: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .container { padding: 16px 10px 0; }
    .card { padding: 16px 14px; }
    .options-row { flex-direction: column; }
    .key-row { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">JTR</div>
    <div>
      <div class="header-title">周报 / 日报生成器</div>
      <div class="header-sub">输入工作内容，AI 帮你整理成专业报告</div>
    </div>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">
      <div class="card-title-left">报告设置</div>
    </div>

    <div style="margin-bottom:14px;">
      <div class="opt-label" style="margin-bottom:8px;">报告类型</div>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-daily" onclick="setType('daily')">📅 日报</button>
        <button class="toggle-btn" id="btn-weekly" onclick="setType('weekly')">📊 周报</button>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <div class="opt-label" style="margin-bottom:8px;">输入方式</div>
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-free" onclick="setMode('free')">✏️ 自由输入</button>
        <button class="mode-tab" id="tab-struct" onclick="setMode('struct')">📋 结构化填写</button>
      </div>
    </div>

    <div id="panel-free">
      <textarea id="free-input" placeholder="把今天/这周做的事直接粘贴进来，不需要整理格式，AI 会帮你梳理...&#10;&#10;例如：上午开了产品评审会，下午修了3个bug，晚上写了接口文档，明天要继续对接前端..." rows="6"></textarea>
    </div>

    <div id="panel-struct" style="display:none;">
      <div class="struct-form">
        <div class="form-item">
          <label>✅ 已完成事项 <span class="badge badge-req">必填</span></label>
          <textarea id="s-done" placeholder="列出今天/本周完成的工作，每项一行&#10;例如：完成用户登录模块开发&#10;参加产品需求评审会议" rows="4"></textarea>
        </div>
        <div class="form-item">
          <label>🔄 进行中事项 <span class="badge badge-opt">选填</span></label>
          <textarea id="s-wip" placeholder="正在进行但尚未完成的工作&#10;例如：数据报表页面开发中（预计明天完成）" rows="3"></textarea>
        </div>
        <div class="form-item">
          <label>⚠️ 遇到的问题 <span class="badge badge-opt">选填</span></label>
          <textarea id="s-issue" placeholder="遇到的困难或需要协调的事项&#10;例如：接口联调时发现数据格式不一致，已与后端沟通中" rows="3"></textarea>
        </div>
        <div class="form-item">
          <label>📌 明日/下周计划 <span class="badge badge-opt">选填</span></label>
          <textarea id="s-plan" placeholder="下一步工作计划&#10;例如：完成前端页面联调，提交测试" rows="3"></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="card-title-left">输出选项</div>
    </div>
    <div class="options-row">
      <div class="opt-group">
        <div class="opt-label">报告风格</div>
        <div class="opt-btns">
          <button class="opt-btn active" id="style-formal" onclick="setOpt('style','formal',this)">正式</button>
          <button class="opt-btn" id="style-simple" onclick="setOpt('style','simple',this)">简洁</button>
        </div>
      </div>
      <div class="opt-group">
        <div class="opt-label">字数控制</div>
        <div class="opt-btns" id="len-btns">
          <button class="opt-btn active" id="len-a" onclick="setLen(this)">200字</button>
          <button class="opt-btn" id="len-b" onclick="setLen(this)">300字</button>
          <button class="opt-btn" id="len-c" onclick="setLen(this)">500字</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <div class="card-title-left">AI 增强（可选）</div>
      <div class="adv-toggle" onclick="toggleAdv()">高级设置 ⚙️</div>
    </div>
    <div class="tip">
      <strong>免费模式</strong>：基础模板生成 + 量化数据缺失提示，无需 API Key<br>
      <strong>AI 模式</strong>：填入 Key 后解锁润色优化 + 智能扩写，让报告更专业
    </div>
    <div class="key-row">
      <input type="password" id="api-key" placeholder="sk-... 填入 API Key 解锁 AI 能力">
      <select id="model-select">
        <option value="gpt-4o-mini">GPT-4o-mini</option>
        <option value="deepseek-chat">DeepSeek Chat</option>
      </select>
    </div>
    <div class="opt-btns" style="margin-bottom:4px;">
      <button class="opt-btn active" id="feat-polish" onclick="toggleFeat('polish',this)">✨ AI 润色优化</button>
      <button class="opt-btn active" id="feat-expand" onclick="toggleFeat('expand',this)">📝 智能扩写</button>
    </div>

    <div class="adv-panel" id="adv-panel">
      <div class="struct-form">
        <div class="form-item">
          <label>自定义接口地址 (Base URL)</label>
          <input type="text" id="api-base" placeholder="例如: https://api.openai.com/v1 或 本地代理地址">
        </div>
        <div class="form-item">
          <label>自定义角色设定</label>
          <input type="text" id="custom-role" placeholder="例如: 我是一名负责电商业务的前端开发工程师">
        </div>
        <div class="form-item">
          <label>附加提示词</label>
          <textarea id="custom-prompt" placeholder="例如: 重点突出数据指标，弱化常规bug修复的描述..." rows="2" style="min-height: 60px;"></textarea>
        </div>
      </div>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="handleGenerateClick()">生成报告</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loading-text">正在生成...</span>
  </div>

  <div id="warn-card" class="card" style="display:none;">
    <div class="card-title">
      <div class="card-title-left">💡 量化数据建议</div>
    </div>
    <div class="tip">以下内容建议补充具体数据，可让报告更有说服力：</div>
    <div class="warn-list visible" id="warn-list"></div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <div class="result-title card-title-left" style="color: var(--orange2); font-weight: 700; font-size: 14px;">生成结果</div>
      <div class="action-btns">
        <button class="action-btn" onclick="exportMD()">💾 导出 MD</button>
        <button class="action-btn copy-btn" onclick="copyResult()">📋 复制 (带格式)</button>
      </div>
    </div>
    <div class="result-text" id="result-text"></div>
    <div id="raw-text-store" style="display:none;"></div>
    
    <div class="word-count" id="word-count"></div>
  </div>

  <div class="card">
    <div class="card-title" style="justify-content:space-between;display:flex;align-items:center;">
      <div class="card-title-left">历史记录</div>
      <button class="history-del" onclick="clearHistory()" style="font-size:12px;">清空全部</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<script>
// ── State ──
const state = {
  type: 'daily',
  mode: 'free',
  style: 'formal',
  len: '200',
  feats: { polish: true, expand: true }
};

let abortController = null; // 用于中断 API 请求

const lenOptions = {
  daily:  [['200字','200'], ['300字','300'], ['500字','500']],
  weekly: [['400字','400'], ['600字','600'], ['800字','800']]
};

function setType(t) {
  state.type = t;
  document.getElementById('btn-daily').classList.toggle('active', t === 'daily');
  document.getElementById('btn-weekly').classList.toggle('active', t === 'weekly');
  const opts = lenOptions[t];
  ['len-a','len-b','len-c'].forEach((id, i) => {
    const btn = document.getElementById(id);
    btn.textContent = opts[i][0];
    btn.classList.toggle('active', i === 0);
  });
  state.len = opts[0][1];
}

function setLen(el) {
  state.len = el.textContent.replace('字','');
  document.getElementById('len-btns').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function setMode(m) {
  state.mode = m;
  document.getElementById('tab-free').classList.toggle('active', m === 'free');
  document.getElementById('tab-struct').classList.toggle('active', m === 'struct');
  document.getElementById('panel-free').style.display = m === 'free' ? '' : 'none';
  document.getElementById('panel-struct').style.display = m === 'struct' ? '' : 'none';
}

function setOpt(key, val, el) {
  state[key] = val;
  el.closest('.opt-btns').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function toggleFeat(feat, el) {
  state.feats[feat] = !state.feats[feat];
  el.classList.toggle('active', state.feats[feat]);
}

function toggleAdv() {
  const panel = document.getElementById('adv-panel');
  panel.classList.toggle('visible');
}

// ── Get input content ──
function getContent() {
  if (state.mode === 'free') {
    return document.getElementById('free-input').value.trim();
  } else {
    const done = document.getElementById('s-done').value.trim();
    const wip = document.getElementById('s-wip').value.trim();
    const issue = document.getElementById('s-issue').value.trim();
    const plan = document.getElementById('s-plan').value.trim();
    let parts = [];
    if (done) parts.push('【已完成】\n' + done);
    if (wip) parts.push('【进行中】\n' + wip);
    if (issue) parts.push('【遇到问题】\n' + issue);
    if (plan) parts.push('【下步计划】\n' + plan);
    return parts.join('\n\n');
  }
}

// ── Quantification check ──
const quantKeywords = [
  { re: /沟通|对接|联系|交流|开会|会议/, hint: '建议补充：沟通次数、会议时长或达成的具体结论' },
  { re: /完成|开发|实现|编写|制作/, hint: '建议补充：完成数量、代码行数或功能模块数' },
  { re: /修复|解决|处理|优化/, hint: '建议补充：修复 bug 数量、优化前后的对比数据' },
  { re: /学习|研究|调研|了解/, hint: '建议补充：学习时长、输出的文档或结论数量' },
  { re: /测试|检查|验证/, hint: '建议补充：测试用例数量、通过率或发现的问题数' },
];

function checkQuantification(text) {
  const warns = [];
  quantKeywords.forEach(({ re, hint }) => {
    if (re.test(text) && !/\d/.test(text.match(re)[0] + (text.match(re).index > 5 ? text.slice(text.search(re) - 5, text.search(re) + 30) : text.slice(0, 40)))) {
      warns.push(hint);
    }
  });
  return [...new Set(warns)];
}

// ── Build prompt ──
function buildPrompt(content) {
  const typeLabel = state.type === 'daily' ? '日报' : '周报';
  const styleDesc = state.style === 'formal'
    ? '语气正式专业，结构清晰，适合向上级汇报'
    : '语言简洁直接，去掉冗余客套话，只保留核心信息';
  const lenNote = `输出字数控制在 ${state.len} 字左右`;
  const expandNote = state.feats.expand ? '对过于简短的条目进行合理扩写，补充细节使内容丰满' : '';
  const polishNote = state.feats.polish ? '将模糊表述转化为具体表述（如"负责XX"改为"主导XX，完成XX"），增强动词力度' : '';
  
  const customRole = document.getElementById('custom-role').value.trim();
  const customPrompt = document.getElementById('custom-prompt').value.trim();

  let roleStr = customRole ? `你的角色设定是：${customRole}。` : '你是一位专业的职场文字助手。';
  let extraPromptStr = customPrompt ? `\n7. 特殊要求：${customPrompt}` : '';

  return `${roleStr}请根据以下工作内容，生成一份使用 Markdown 格式排版的${typeLabel}。

要求：
1. ${styleDesc}
2. ${lenNote}
3. 结构包含：今日完成工作、进行中事项（如有）、遇到问题（如有）、下步计划（如有），请使用 Markdown 标题 (###)
4. ${polishNote}
5. ${expandNote}
6. 直接输出${typeLabel}正文，不要任何前言或解释${extraPromptStr}

工作内容：
${content}`;
}

// ── Handle Generation & Abort ──
function handleGenerateClick() {
  const btn = document.getElementById('gen-btn');
  if (btn.classList.contains('loading-state')) {
    // 正在生成中，执行取消操作
    if (abortController) {
      abortController.abort();
    }
    resetUIState();
  } else {
    // 开始生成
    generate();
  }
}

function resetUIState() {
  const btn = document.getElementById('gen-btn');
  btn.classList.remove('loading-state');
  btn.textContent = '生成报告';
  document.getElementById('loading').classList.remove('visible');
}

async function generate() {
  const content = getContent();
  if (!content) {
    alert('请先填写工作内容');
    return;
  }

  const apiKey = document.getElementById('api-key').value.trim();
  const customBaseUrl = document.getElementById('api-base').value.trim();
  const model = document.getElementById('model-select').value;
  const hasKey = apiKey.length > 10;

  // Set UI to loading state
  const btn = document.getElementById('gen-btn');
  btn.classList.add('loading-state');
  btn.textContent = '🚨 停止生成';
  document.getElementById('loading').classList.add('visible');
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('warn-card').style.display = 'none';
  document.getElementById('loading-text').textContent = hasKey ? 'AI 正在生成报告...' : '正在生成基础报告...';

  // Create Abort Controller
  abortController = new AbortController();
  const signal = abortController.signal;

  // Quantification check
  const warns = checkQuantification(content);
  if (warns.length) {
    const warnCard = document.getElementById('warn-card');
    const warnList = document.getElementById('warn-list');
    warnList.innerHTML = warns.map(w => `<div class="warn-item"><div class="warn-dot"></div><span>${w}</span></div>`).join('');
    warnCard.style.display = '';
  }

  let rawResult = '';

  try {
    if (hasKey) {
      // Determine Base URL
      let baseUrl = 'https://jotarou.com/v1'; // Default Fallback
      if (customBaseUrl) {
        baseUrl = customBaseUrl.replace(/\/+$/, ''); // Remove trailing slashes
      } else if (model === 'deepseek-chat') {
        baseUrl = 'https://api.deepseek.com/v1';
      }

      const resp = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: model,
          max_tokens: 1200,
          messages: [{ role: 'user', content: buildPrompt(content) }]
        }),
        signal: signal
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error?.message || `请求失败 (${resp.status})`);
      }

      const data = await resp.json();
      rawResult = data.choices?.[0]?.message?.content || '';
    } else {
      // Free mode logic
      rawResult = buildFreeReport(content);
      // Wait a moment to simulate processing
      await new Promise(resolve => setTimeout(resolve, 800));
    }

    renderResult(rawResult);

  } catch (e) {
    if (e.name === 'AbortError') {
      console.log('User cancelled generation');
      return; // UI already reset in handleGenerateClick
    }
    rawResult = `### ❌ 生成失败\n\n**原因：**${e.message}\n\n请检查 API Key / 接口地址是否正确，或稍后重试。`;
    renderResult(rawResult, false);
  } finally {
    resetUIState();
  }
}

function renderResult(rawMarkdown, shouldSave = true) {
  // Save raw markdown to hidden store for copying/exporting
  document.getElementById('raw-text-store').textContent = rawMarkdown;
  
  // Use marked to parse MD, and DOMPurify to clean it
  const htmlContent = DOMPurify.sanitize(marked.parse(rawMarkdown));
  document.getElementById('result-text').innerHTML = htmlContent;
  
  // Count text only (strip tags)
  const plainText = document.getElementById('result-text').innerText;
  document.getElementById('word-count').textContent = `共 ${plainText.replace(/\s/g,'').length} 字`;
  
  document.getElementById('result-card').classList.add('visible');
  
  if (shouldSave) {
    saveHistory(rawMarkdown);
    renderHistory();
  }

  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Free mode template ──
function buildFreeReport(content) {
  const typeLabel = state.type === 'daily' ? '日报' : '周报';
  const today = new Date();
  const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

  const lines = content.split('\n').filter(l => l.trim());
  let report = `## ${typeLabel} (${dateStr})\n\n`;

  if (state.mode === 'struct') {
    // If structural, it's already well partitioned, just format nicely
    lines.forEach(l => {
      if (l.startsWith('【')) report += `### ${l.replace(/[【】]/g, '')}\n`;
      else report += `- ${l}\n`;
    });
  } else {
    // Basic formatting for free input
    report += `### 📌 工作记录\n`;
    lines.forEach((l, i) => { report += `- ${l.replace(/^[-•*]\s*/,'')}\n`; });
  }

  report += `\n> *提示：当前为基础模式。填入 API Key 即可启用 AI 润色，智能排版并扩充细节。*`;
  return report;
}

// ── Copy (Rich Text Support) ──
async function copyResult() {
  const btn = document.querySelector('.copy-btn');
  const resultElement = document.getElementById('result-text');
  
  const html = resultElement.innerHTML;
  const text = resultElement.innerText; // Fallback plain text

  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const typeText = "text/plain";
      const typeHtml = "text/html";
      const blobText = new Blob([text], { type: typeText });
      const blobHtml = new Blob([html], { type: typeHtml });
      const data = [new ClipboardItem({ [typeText]: blobText, [typeHtml]: blobHtml })];
      
      await navigator.clipboard.write(data);
    } else {
      // Fallback for unsupported browsers
      await navigator.clipboard.writeText(text);
    }
    
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制 (带格式)'; }, 2000);
  } catch (err) {
    console.error('Copy failed:', err);
    // Ultimate fallback
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    document.execCommand("copy");
    document.body.removeChild(textArea);
    btn.textContent = '✅ 已复制 (纯文本)';
    setTimeout(() => { btn.textContent = '📋 复制 (带格式)'; }, 2000);
  }
}

// ── Export MD ──
function exportMD() {
  const rawMarkdown = document.getElementById('raw-text-store').textContent;
  const typeLabel = state.type === 'daily' ? '日报' : '周报';
  const dateStr = new Date().toISOString().split('T')[0];
  
  const blob = new Blob([rawMarkdown], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.download = `工作${typeLabel}_${dateStr}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── History ──
const HIST_KEY = 'jtr_report_history_v2';
const MAX_HIST = 50;

function saveHistory(text) {
  let hist = getHistory();
  const item = {
    id: Date.now(),
    type: state.type,
    date: new Date().toLocaleDateString('zh-CN'),
    preview: text.replace(/[#*`>]/g, '').slice(0, 80), // Strip simple MD for preview
    full: text
  };
  hist.unshift(item);
  if (hist.length > MAX_HIST) hist = hist.slice(0, MAX_HIST);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch { return []; }
}

function clearHistory() {
  if(confirm('确定要清空所有历史记录吗？')) {
    localStorage.removeItem(HIST_KEY);
    renderHistory();
  }
}

function deleteHistItem(id) {
  const hist = getHistory().filter(h => h.id !== id);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  renderHistory();
}

function loadHistItem(id) {
  const item = getHistory().find(h => h.id === id);
  if (!item) return;
  
  renderResult(item.full, false); // false means don't save to history again
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const hist = getHistory();
  if (!hist.length) {
    list.innerHTML = '<div class="empty-history">暂无历史记录</div>';
    return;
  }
  list.innerHTML = hist.map(h => `
    <div class="history-item" onclick="loadHistItem(${h.id})">
      <div class="history-meta">
        <span class="history-tag">${h.type === 'daily' ? '日报' : '周报'} · ${h.date}</span>
        <button class="history-del" onclick="event.stopPropagation();deleteHistItem(${h.id})">✕</button>
      </div>
      <div class="history-preview">${h.preview}...</div>
    </div>
  `).join('');
}

// ── Init ──
renderHistory();
</script>
